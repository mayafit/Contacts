{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "frontend.fullname" . }}-strip-api
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.entryPoints | nindent 4 }}
  routes:
    # Backend API route via hostname
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      middlewares:
        - name: {{ include "frontend.fullname" . }}-strip-api
      services:
        - name: {{ .Release.Name }}-backend
          port: 5000
    # Backend API route via IP (catch-all)
    - match: PathPrefix(`/api`)
      kind: Rule
      priority: 90
      middlewares:
        - name: {{ include "frontend.fullname" . }}-strip-api
      services:
        - name: {{ .Release.Name }}-backend
          port: 5000
    # Frontend via hostname
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      priority: 10
      services:
        - name: {{ include "frontend.fullname" . }}
          port: {{ .Values.service.port }}
    # Frontend via IP (catch-all)
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: {{ include "frontend.fullname" . }}
          port: {{ .Values.service.port }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
